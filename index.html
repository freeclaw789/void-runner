<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID RUNNER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="main-menu">
            <h1>VOID RUNNER</h1>
            <div id="high-score">HIGH SCORE: 0</div>
            <div id="start-btn">TAP TO START</div>
            <div id="instr-btn">HOW TO PLAY</div>
        </div>
        <div id="instr-overlay">
            <h2>VOID PROTOCOL</h2>
            <div class="instr-list">
                <div class="instr-item">
                    <span class="dot cyan"></span>
                    <span><strong>Cyan:</strong> You (The Runner)</span>
                </div>
                <div class="instr-item">
                    <span class="dot magenta"></span>
                    <span><strong>Magenta:</strong> Void Obstacles (Avoid!)</span>
                </div>
                <div class="instr-item">
                    <span class="dot yellow"></span>
                    <span><strong>Yellow:</strong> Data Gems (+5 Score)</span>
                </div>
                <div class="instr-item">
                    <span class="dot green"></span>
                    <span><strong>Green 'M':</strong> Magnet Powerup</span>
                </div>
                <div class="instr-item">
                    <span class="dot yellow-glow"></span>
                    <span><strong>Yellow Glow:</strong> Magnet Active</span>
                </div>
            </div>
            <div id="close-instr">CLOSE</div>
        </div>
        <div id="ui">
            <div id="score">0</div>
            <div id="msg"></div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
